<!doctype html><html lang='nl'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Werkplaats Tools - Kantenband</title>
<style>
body{font-family:Arial;background:#ececec;margin:0;padding:18px}
.card{max-width:430px;margin:auto;background:#fff;border-radius:18px;padding:20px;box-shadow:0 3px 12px rgba(0,0,0,.15)}
h2{text-align:center;margin:0 0 18px}
label{font-weight:bold;display:block;margin:14px 0 6px}
input{width:100%;padding:16px;font-size:28px;border-radius:10px;border:2px solid #aaa;box-sizing:border-box}
.row{display:flex;gap:8px;margin-top:10px}
button{flex:1;padding:16px;font-size:20px;border-radius:10px;border:2px solid #666}
.active{background:#222;color:#fff}
.res{margin-top:20px;background:#e8f7e8;border-radius:14px;padding:18px;text-align:center}
.small{color:#555;font-size:16px}.big{font-size:42px;font-weight:bold}
.ver{text-align:center;margin-top:16px;color:#666}
</style></head><body><div class='card'>
<h2>🧰 Werkplaats Tools</h2>
<label>Binnendiameter (mm)</label><input id='bi'>
<label>Buitendiameter (mm)</label><input id='bo'>
<label>Dikte</label>
<div class='row'>
<button data-d='0.8'>0,8</button>
<button data-d='1'>1</button>
<button data-d='2'>2</button>
</div>
<div class='res'><div class='small'>Aantal meter op de rol</div><div id='out' class='big'></div></div>
<div class='ver'>Kantenband Calculator • Versie 1.3</div>
</div>
<script>
let d=localStorage.getItem("dikte")||"1";
bi.value=localStorage.getItem("binnen")||"210";
bo.value="500";
document.querySelectorAll("button").forEach(b=>{
 if(b.dataset.d===d)b.classList.add("active");
 b.onclick=()=>{document.querySelectorAll("button").forEach(x=>x.classList.remove("active"));b.classList.add("active");d=b.dataset.d;localStorage.setItem("dikte",d);calc();}
});
function val(id){return parseFloat(document.getElementById(id).value.replace(",", "."));}
function calc(){
 localStorage.setItem("binnen",bi.value);
 let a=val("bi"),c=val("bo");
 if(isNaN(a)||isNaN(c)||c<=a){out.textContent="Controle";return;}
 let m=Math.PI*(c*c-a*a)/(4*parseFloat(d))/1000;
 out.textContent=m.toFixed(1).replace(".",",")+" m";
}
bi.oninput=calc;bo.oninput=calc;calc();
</script></body></html>
