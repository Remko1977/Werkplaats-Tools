<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Werkplaats Tools</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#ececec;margin:0;padding:18px;color:#222}
.app{max-width:460px;margin:auto}
.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 3px 12px rgba(0,0,0,.15);margin-bottom:16px}
h1,h2{text-align:center;margin:0 0 18px}
.sub{text-align:center;color:#666;margin-top:-8px;margin-bottom:18px}
.tile{width:100%;padding:18px;margin:10px 0;border-radius:14px;border:2px solid #ddd;background:#f8f8f8;text-align:left;font-size:20px;font-weight:bold}
.tile small{display:block;font-size:14px;font-weight:normal;color:#666;margin-top:6px}
.tile.active{border-color:#222;background:#eef7ee}
.tile.soon{opacity:.6;background:#f4f4f4}
label{font-weight:bold;display:block;margin:14px 0 6px}
input{width:100%;padding:16px;font-size:28px;border-radius:10px;border:2px solid #aaa}
.row{display:flex;gap:8px;margin-top:10px}
.row button{flex:1;padding:16px;font-size:20px;border-radius:10px;border:2px solid #666;background:#f5f5f5}
.row button.active{background:#222;color:#fff}
.res{margin-top:20px;background:#e8f7e8;border-radius:14px;padding:18px;text-align:center}
.small{color:#555;font-size:16px}
.big{font-size:42px;font-weight:bold}
.back{margin-bottom:12px;padding:12px 16px;border-radius:10px;border:2px solid #666;background:#fff;font-size:16px}
.ver{text-align:center;margin-top:16px;color:#666;font-size:14px}
.hidden{display:none}
</style>
</head>

<body>
<div class="app">

<section id="home" class="card">
<h1>🧰 Werkplaats Tools</h1>
<div class="sub">Praktische hulpmiddelen voor de werkplaats</div>

<button class="tile active" onclick="toonCalculator()">
📏 Kantenband Calculator
<small>Bereken snel hoeveel meter kantenband er op een rol zit</small>
</button>

<button class="tile soon">
📐 Plaatoptimalisatie
<small>In ontwikkeling</small>
</button>

<button class="tile soon">
🪚 Verstek-aanslag
<small>Op de wensenlijst</small>
</button>

<button class="tile soon">
💡 LED Magazijn
<small>Groot project voor later</small>
</button>

<button class="tile soon">
⚙️ Instellingen
<small>Bedrijfsnaam, logo en standaardwaarden</small>
</button>

<div class="ver">Werkplaats Tools • Versie 1.5</div>
</section>

<section id="calculator" class="card hidden">
<button class="back" onclick="toonHome()">← Terug</button>
<h2>Kantenband Calculator</h2>

<label>Binnendiameter rolkern (mm)</label>
<input id="bi" value="210" inputmode="decimal">

<label>Buitendiameter rol (mm)</label>
<input id="bo" value="500" inputmode="decimal">

<label>Dikte kantenband</label>
<div class="row">
<button data-d="0.8">0,8 mm</button>
<button data-d="1">1 mm</button>
<button data-d="2">2 mm</button>
</div>

<div class="res">
<div class="small">Aantal meter op de rol</div>
<div id="out" class="big"></div>
</div>

<div class="ver">Kantenband Calculator • Versie 1.5</div>
</section>

</div>

<script>
function toonCalculator(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("calculator").classList.remove("hidden");
}
function toonHome(){
  document.getElementById("calculator").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

let d = localStorage.getItem("dikte") || "1";
document.getElementById("bi").value = localStorage.getItem("binnen") || "210";
document.getElementById("bo").value = localStorage.getItem("buiten") || "500";

document.querySelectorAll("button[data-d]").forEach(btn=>{
  if(btn.dataset.d===d) btn.classList.add("active");
  btn.onclick=()=>{
    document.querySelectorAll("button[data-d]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    d=btn.dataset.d;
    localStorage.setItem("dikte",d);
    calc();
  }
});

function val(id){
  return parseFloat(document.getElementById(id).value.replace(",","."));
}

function calc(){
  localStorage.setItem("binnen",document.getElementById("bi").value);
  localStorage.setItem("buiten",document.getElementById("bo").value);
  const bi=val("bi"), bo=val("bo");
  if(isNaN(bi)||isNaN(bo)||bo<=bi){
    document.getElementById("out").textContent="Controle";
    return;
  }
  const m=Math.PI*(bo*bo-bi*bi)/(4*parseFloat(d))/1000;
  document.getElementById("out").textContent=m.toFixed(1).replace(".",",")+" m";
}

document.getElementById("bi").oninput=calc;
document.getElementById("bo").oninput=calc;
calc();
</script>
</body>
</html>
